name: Sync Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */12 * * *'

permissions:
  contents: write

jobs:
  check-upstream-frequency:
    name: Check upstream update frequency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Analyze upstream commits (last 30 days)
        id: frequency
        shell: bash
        run: |
          set -euo pipefail
          git remote add upstream https://github.com/pymupdf/PyMuPDF.git || true
          git fetch upstream main

          commits_30d="$(git rev-list --count --since='30 days ago' upstream/main)"

          if [ "$commits_30d" -ge 20 ]; then
            recommendation='建议每 12 小时同步一次'
          elif [ "$commits_30d" -ge 8 ]; then
            recommendation='建议每天同步一次'
          else
            recommendation='建议每周同步一次'
          fi

          echo "commits_30d=$commits_30d" >> "$GITHUB_OUTPUT"
          echo "recommendation=$recommendation" >> "$GITHUB_OUTPUT"

      - name: Summary
        shell: bash
        run: |
          {
            echo "### Upstream Update Frequency"
            echo ""
            echo "- Upstream: \`pymupdf/PyMuPDF\`"
            echo "- 最近 30 天提交数: \`${{ steps.frequency.outputs.commits_30d }}\`"
            echo "- 当前同步计划: \`每 12 小时\`"
            echo "- 频率建议: \`${{ steps.frequency.outputs.recommendation }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  sync-upstream:
    name: Sync upstream branch
    runs-on: ubuntu-latest
    needs: check-upstream-frequency
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync upstream/main -> main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/pymupdf/PyMuPDF.git || true
          git fetch upstream main
          git checkout main

          git merge --ff-only upstream/main || git merge --no-edit upstream/main
          git push origin main
