name: Sync Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */12 * * *'

permissions:
  contents: write

jobs:
  check-upstream-frequency:
    name: Check upstream update frequency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Analyze upstream commits (last 30 days)
        id: frequency
        shell: bash
        run: |
          set -euo pipefail
          git remote add upstream https://github.com/pymupdf/PyMuPDF.git || true
          git fetch upstream main

          commits_30d="$(git rev-list --count --since='30 days ago' upstream/main)"
          high_activity_threshold=20
          medium_activity_threshold=8
          # Threshold rationale:
          # - >=20 commits/30d  -> high activity, sync every 12h
          # - >=8 commits/30d   -> medium activity, sync daily
          # - <8 commits/30d    -> low activity, sync weekly
          if [ "$commits_30d" -ge "$high_activity_threshold" ]; then
            recommendation='Recommended sync interval: every 12 hours'
          elif [ "$commits_30d" -ge "$medium_activity_threshold" ]; then
            recommendation='Recommended sync interval: daily'
          else
            recommendation='Recommended sync interval: weekly'
          fi

          echo "commits_30d=$commits_30d" >> "$GITHUB_OUTPUT"
          echo "recommendation=$recommendation" >> "$GITHUB_OUTPUT"

      - name: Summary
        shell: bash
        run: |
          {
            echo "### Upstream Update Frequency"
            echo ""
            echo "- Upstream: \`pymupdf/PyMuPDF\`"
            echo "- Commits in the last 30 days: \`${{ steps.frequency.outputs.commits_30d }}\`"
            echo "- Current sync schedule: \`every 12 hours\`"
            echo "- Recommended interval: \`${{ steps.frequency.outputs.recommendation }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  sync-upstream:
    name: Sync upstream branch
    runs-on: ubuntu-latest
    needs: check-upstream-frequency
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync upstream/main -> main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/pymupdf/PyMuPDF.git || true
          git fetch upstream main
          git checkout main

          if ! git merge --ff-only upstream/main; then
            echo "::error::Fast-forward sync failed because local main and upstream/main have diverged."
            echo "::error::Please resolve manually (e.g. merge/rebase in a PR) and then re-run this workflow."
            echo "Local main: $(git rev-parse --short HEAD)"
            echo "Upstream main: $(git rev-parse --short upstream/main)"
            exit 1
          fi
          git push origin main
